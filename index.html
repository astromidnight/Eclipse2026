document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

[0.2543,40.3567],[1.5591,39.8786],[2.8917,39.43],[4.2465,39.0126],[5.4274,38.6788]]}},{\"type\":\"Feature\",\"properties\":{\"Name\":\"Southern Limit\"},\"geometry\":{\"type\":\"LineString\",\"coordinates\":[[-15.4398,47.9805],[-14.3426,47.0473],[-13.3126,46.2249],[-12.1792,45.3762],[-11.1356,44.6432],[-9.9762,43.8797],[-8.941,43.2405],[-7.7789,42.5674],[-6.4422,41.8477],[-5.2752,41.2638],[-3.8243,40.5917],[-2.5345,40.0411],[-1.1993,39.5145],[0.2003,39.0068],[1.4863,38.578],[3.1906,38.0618],[4.552,37.6887]]}},{\"type\":\"Feature\",\"properties\":{\"Name\":\"Umbra\"},\"geometry\":{\"type\":\"Polygon\",\"coordinates\":[[[-15.4398,47.9805],[-14.0094,46.7757],[-12.3764,45.5198],[-10.6874,44.3419],[-8.941,43.2405],[-7.1365,42.2145],[-5.2752,41.2638],[-3.325,40.3736],[-1.3071,39.5554],[0.0512,39.0588],[1.4863,38.578],[3.1906,38.0618],[4.552,37.6887],[6.3535,39.7067],[4.0824,40.4008],[1.8727,41.1874],[-0.2845,42.0731],[-1.407,42.5847],[-2.4194,43.0785],[-4.2527,44.0575],[-5.1787,44.5971],[-6.2754,45.2789],[-7.2523,45.9282],[-8.1365,46.5525],[-8.946,47.1569],[-9.8725,47.8901]]]}}]};\n\nconst MAX_ECLIPSE_CURVE = {\"type\":\"FeatureCollection\",\"name\":\"Maximum Eclipse Curve 00:30UT\",\"features\":[{\"type\":\"Feature\",\"properties\":{\"Name\":\"Maximum Eclipse Curve 00:30UT\",\"note\":\"Points of simultaneous maximum eclipse across Iberia\"},\"geometry\":{\"type\":\"LineString\",\"coordinates\":[[4.994,40.1375],[2.9778,40.6057],[0.9253,41.0225],[-1.0869,41.3753],[-3.2063,41.6898],[-5.3573,41.9515],[-7.6163,42.1663],[-9.8257,42.319],[-11.9803,42.4148]]}}]};\n\nconst CITIES = [\n  { name: \"Oviedo\",        lat: 43.360, lon: -5.840 },\n  { name: \"Santander\",     lat: 43.462, lon: -3.810 },\n  { name: \"Bilbao\",        lat: 43.263, lon: -2.935 },\n  { name: \"San Sebastián\", lat: 43.312, lon: -1.975 },\n  { name: \"Pamplona\",      lat: 42.812, lon: -1.644 },\n  { name: \"Zaragoza\",      lat: 41.648, lon: -0.887 },\n  { name: \"Barcelona\",     lat: 41.385, lon:  2.173 },\n  { name: \"Valencia\",      lat: 39.469, lon: -0.376 },\n  { name: \"Madrid\",        lat: 40.416, lon: -3.703 },\n  { name: \"Porto\",         lat: 41.157, lon: -8.629 },\n  { name: \"Lisbon\",        lat: 38.717, lon: -9.139 },\n  { name: \"Seville\",       lat: 37.383, lon: -5.997 }\n];\n\n/* ─── i18n ─── */\nconst I18N = {\n  en: {\n    title: \"Total Solar Eclipse - August 12, 2026\",\n    subtitle: \"Interactive map\",\n    date: \"Iberian Peninsula\",\n    safetyHead: \"Safety warning:\",\n    safetyBody: \"Always observe the eclipse with appropriate solar viewing glasses. Never look at the Sun with the naked eye.\",\n    legend: \"Legend\",\n    pathOfTotality: \"Path of totality\",\n    totalEclipse: \"Total eclipse (100%)\",\n    partialEclipse: \"Partial eclipse\",\n    creditLabel: \"Data\",\n    creditBody: \"Eclipse KML paths provided by\",\n    emptyTitle: \"Select a location\",\n    emptySub: \"Click anywhere on the map to see the eclipse details and a horizon simulation.\",\n    badgeTotal: \"Total\",\n    badgePartial: \"Partial\",\n    countryPT: \"Portugal\",\n    countryES: \"Spain\",\n    maxObscuration: \"Maximum obscuration\",\n    maximum: \"Maximum\",\n    duration: \"Duration\",\n    horizonView: \"Horizon view · Looking south-west\",\n    share: \"Share\",\n    shareTitle: \"Location copied!\",\n    shareSub: \"The image is on your clipboard — paste it to share on any social network.\",\n    shareSavedTitle: \"Save the image\",\n    shareSavedSub: \"Your browser doesn't allow copying images — download it to share on any social network.\",\n    shareDownload: \"Download\",\n    sharePreviewLabel: \"Location preview\",\n    shareCardTitle: \"Total Solar Eclipse - August 12, 2026\",\n    shareDone: \"Done\",\n    localTime: \"Local time\",\n    currentCoverage: \"Current coverage\",\n    firstContact: \"1st contact\",\n    fourthContact: \"4th contact\",\n    outside: \"This location is outside the eclipse visibility area.\",\n    play: \"Play eclipse animation\",\n    pause: \"Pause eclipse animation\",\n    coverageAria: (t, c) => `Local time ${t} — ${c} percent coverage`,\n  },\n  pt: {\n    title: \"Eclipse Solar Total - 12 de Agosto de 2026\",\n    subtitle: \"Mapa interativo\",\n    date: \"Península Ibérica\",\n    safetyHead: \"Aviso de segurança:\",\n    safetyBody: \"Observe sempre o eclipse com óculos solares apropriados. Nunca olhe diretamente para o Sol.\",\n    legend: \"Legenda\",\n    pathOfTotality: \"Faixa de totalidade\",\n    totalEclipse: \"Eclipse total (100%)\",\n    partialEclipse: \"Eclipse parcial\",\n    creditLabel: \"Dados\",\n    creditBody: \"Trajetórias KML do eclipse fornecidas por\",\n    emptyTitle: \"Selecione um local\",\n    emptySub: \"Clique em qualquer ponto do mapa para ver os detalhes do eclipse e uma simulação do horizonte.\",\n    badgeTotal: \"Total\",\n    badgePartial: \"Parcial\",\n    countryPT: \"Portugal\",\n    countryES: \"Espanha\",\n    maxObscuration: \"Obscuridade máxima\",\n    maximum: \"Máximo\",\n    duration: \"Duração\",\n    horizonView: \"Vista do horizonte · Olhando para sudoeste\",\n    share: \"Partilhar\",\n    shareTitle: \"Localização copiada!\",\n    shareSub: \"A imagem está na área de transferência — cole-a para partilhar em qualquer rede social.\",\n    shareSavedTitle: \"Guardar a imagem\",\n    shareSavedSub: \"O seu navegador não permite copiar imagens — transfira-a para partilhar em qualquer rede social.\",\n    shareDownload: \"Transferir\",\n    sharePreviewLabel: \"Pré-visualização da localização\",\n    shareCardTitle: \"Eclipse Solar Total - 12 de Agosto de 2026\",\n    shareDone: \"Fechar\",\n    localTime: \"Hora local\",\n    currentCoverage: \"Cobertura atual\",\n    firstContact: \"1.º contacto\",\n    fourthContact: \"4.º contacto\",\n    outside: \"Este local está fora da área de visibilidade do eclipse.\",\n    play: \"Reproduzir animação do eclipse\",\n    pause: \"Pausar animação do eclipse\",\n    coverageAria: (t, c) => `Hora local ${t} — ${c} por cento de cobertura`,\n  },\n};\nlet LANG = (() => {\n  try { return localStorage.getItem(\"eclipse-lang\") || \"en\"; } catch { return \"en\"; }\n})();\nif (!I18N[LANG]) LANG = \"en\";\nfunction t(key) { return I18N[LANG][key]; }\n\nfunction applyStaticI18N() {\n  document.documentElement.lang = LANG;\n  document.title = t(\"title\");\n  document.querySelectorAll(\"[data-i18n]\").forEach(el => {\n    const key = el.getAttribute(\"data-i18n\");\n    const val = I18N[LANG][key];\n    if (typeof val === \"string\") el.textContent = val;\n  });\n  // Re-render panel if a location is active\n  if (currentState) renderPanel();\n  else if (outsideState) renderOutside(outsideState.lat, outsideState.lon, outsideState.name);\n}\n\nfunction setLang(newLang) {\n  if (!I18N[newLang] || newLang === LANG) return;\n  LANG = newLang;\n  try { localStorage.setItem(\"eclipse-lang\", LANG); } catch {}\n  document.querySelectorAll(\".lang-btn\").forEach(b => {\n    b.classList.toggle(\"active\", b.dataset.lang === LANG);\n  });\n  applyStaticI18N();\n}\n\ndocument.querySelectorAll(\".lang-btn\").forEach(b => {\n  b.classList.toggle(\"active\", b.dataset.lang === LANG);\n  b.addEventListener(\"click\", () => setLang(b.dataset.lang));\n});\n\n/* ─── Theme ─── */\nlet THEME = (() => {\n  try { return localStorage.getItem(\"eclipse-theme\") || \"dark\"; } catch { return \"dark\"; }\n})();\nif (THEME !== \"dark\" && THEME !== \"light\") THEME = \"dark\";\ndocument.documentElement.setAttribute(\"data-theme\", THEME);\n\nconst TILE_URLS = {\n  dark:  \"https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png\",\n  light: \"https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png\",\n};\nconst LABEL_URLS = {\n  dark:  \"https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png\",\n  light: \"https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png\",\n};\n\nfunction applyTheme() {\n  document.documentElement.setAttribute(\"data-theme\", THEME);\n  if (typeof tileLayer !== \"undefined\" && tileLayer) {\n    tileLayer.setUrl(TILE_URLS[THEME]);\n  }\n  if (typeof labelLayer !== \"undefined\" && labelLayer) {\n    labelLayer.setUrl(LABEL_URLS[THEME]);\n  }\n  if (typeof applyUmbraTheme === \"function\") applyUmbraTheme();\n}\n\nfunction setTheme(t) {\n  if (t !== \"dark\" && t !== \"light\") return;\n  THEME = t;\n  try { localStorage.setItem(\"eclipse-theme\", THEME); } catch {}\n  applyTheme();\n}\n\ndocument.getElementById(\"theme-toggle\").addEventListener(\"click\", () => {\n  setTheme(THEME === \"dark\" ? \"light\" : \"dark\");\n});\n\n/* ─── Geo helpers ─── */\nconst UMBRA_FEAT = UMBRAL_PATH.features.find(f => f.properties.Name === \"Umbra\");\nconst NORTH_LIM  = UMBRAL_PATH.features.find(f => f.properties.Name === \"Northern Limit\").geometry.coordinates;\nconst SOUTH_LIM  = UMBRAL_PATH.features.find(f => f.properties.Name === \"Southern Limit\").geometry.coordinates;\nconst CENTER_LIN = UMBRAL_PATH.features.find(f => f.properties.Name === \"Central Line\").geometry.coordinates;\nconst MAX_CURVE  = MAX_ECLIPSE_CURVE.features[0].geometry.coordinates;\n\nfunction pointInRing(lon, lat, ring) {\n  let inside = false;\n  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {\n    const xi = ring[i][0], yi = ring[i][1];\n    const xj = ring[j][0], yj = ring[j][1];\n    const intersect = ((yi > lat) !== (yj > lat)) &&\n      (lon < (xj - xi) * (lat - yi) / ((yj - yi) || 1e-12) + xi);\n    if (intersect) inside = !inside;\n  }\n  return inside;\n}\nfunction pointInUmbra(lon, lat) {\n  return pointInRing(lon, lat, UMBRA_FEAT.geometry.coordinates[0]);\n}\n\n// Haversine distance (km)\nfunction haversine(lat1, lon1, lat2, lon2) {\n  const R = 6371;\n  const toRad = (d) => d * Math.PI / 180;\n  const dLat = toRad(lat2 - lat1);\n  const dLon = toRad(lon2 - lon1);\n  const a = Math.sin(dLat/2) ** 2 +\n            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) ** 2;\n  return R * 2 * Math.asin(Math.sqrt(a));\n}\n\n// Nearest distance from point to a polyline (km) — sample segments\nfunction nearestDistToLine(lat, lon, line) {\n  let best = Infinity;\n  for (let i = 0; i < line.length - 1; i++) {\n    const [lon1, lat1] = line[i];\n    const [lon2, lat2] = line[i+1];\n    // sample 24 points along each segment\n    const N = 24;\n    for (let k = 0; k <= N; k++) {\n      const t = k / N;\n      const la = lat1 + (lat2 - lat1) * t;\n      const lo = lon1 + (lon2 - lon1) * t;\n      const d = haversine(lat, lon, la, lo);\n      if (d < best) best = d;\n    }\n  }\n  return best;\n}\n\nfunction obscurationAt(lat, lon) {\n  if (pointInUmbra(lon, lat)) return 100;\n  // Empirical power-law fit calibrated against real Aug 12 2026 values:\n  // Porto (d_edge ≈ 211 km) → 98.24%, Lisbon (d_edge ≈ 418 km) → 94.47%.\n  // Solving 100 − K·d^a for both points yields a ≈ 1.674, K ≈ 2.259e−4.\n  // The spec's original linear 100·(1 − d/3400) was inconsistent with these\n  // reference values; this curve fits them and produces physically\n  // reasonable values across the Iberian Peninsula.\n  const dN = nearestDistToLine(lat, lon, NORTH_LIM);\n  const dS = nearestDistToLine(lat, lon, SOUTH_LIM);\n  const d_edge = Math.min(dN, dS);\n  const obs = Math.max(0, 100 - 2.259e-4 * Math.pow(d_edge, 1.674));\n  return Math.round(obs * 100) / 100;\n}\n\n// Totality duration in seconds at a given lat/lon. Returns 0 for points\n// outside the umbra. Calibrated against real Aug 12 2026 durations using\n// actual haversine d_center distances:\n//   Oviedo   (d_center ≈ 15 km)  → 1m49s\n//   Zaragoza (d_center ≈ 81 km)  → 1m25s\n//   Bilbao   (d_center ≈ 145 km) → 0m33s\n// Fit: duration = MAX · √(1 − d_center / H), MAX = 114.6 s, H = 158.1 km.\n// Bilbao + Oviedo hit exactly; Zaragoza within ~5 s.\nfunction totalityDurationSec(lat, lon) {\n  if (!pointInUmbra(lon, lat)) return 0;\n  const dCenter = nearestDistToLine(lat, lon, CENTER_LIN);\n  const HALF_WIDTH = 158.1;\n  const MAX_DURATION = 114.6;\n  const frac = Math.max(0, 1 - dCenter / HALF_WIDTH);\n  return MAX_DURATION * Math.sqrt(frac);\n}\n\n// Time of maximum eclipse (UT minutes since 00:00). Empirical linear fit\n// calibrated against real Aug 12 2026 values:\n//   León   (42.60°N,  −5.60°E) → 18:29 UT\n//   Porto  (41.16°N,  −8.63°E) → 18:32 UT\n//   Lisbon (38.72°N,  −9.14°E) → 18:36 UT\n// max ≈ 1175.47 − 1.591·lat − 0.234·lon (in UT minutes).\nfunction maxEclipseUtMinutes(lat, lon) {\n  return 1175.47 - 1.591 * lat - 0.234 * lon;\n}\n\nfunction isPortugal(lat, lon) {\n  return lon < -6.19 && lat < 42.15;\n}\n\nfunction fmtObs(obs) {\n  // 100.00% reads cleaner as 100%; keep 2 decimals for every partial value.\n  return obs >= 100 ? \"100%\" : obs.toFixed(2) + \"%\";\n}\n\nfunction fmtTime(min) {\n  // min may be float; round to nearest\n  const m = Math.round(min);\n  const total = ((m % 1440) + 1440) % 1440;\n  const hh = Math.floor(total / 60);\n  const mm = total % 60;\n  return String(hh).padStart(2,\"0\") + \":\" + String(mm).padStart(2,\"0\");\n}\n\nfunction fmtDurationShort(min) {\n  // min is fractional minutes. Return \"Xh Ym\" if >= 60, else \"Xm Ys\" if < 5, else \"Xm\".\n  if (min < 0) min = 0;\n  if (min >= 60) {\n    const h = Math.floor(min / 60);\n    const m = Math.round(min - h * 60);\n    return `${h} h ${m} m`;\n  }\n  if (min < 5) {\n    const totalSec = Math.round(min * 60);\n    const m = Math.floor(totalSec / 60);\n    const s = totalSec - m * 60;\n    return `${m} m ${String(s).padStart(2,\"0\")} s`;\n  }\n  return `${Math.round(min)} m`;\n}\n\nfunction fmtCoord(lat, lon) {\n  const ns = lat >= 0 ? \"N\" : \"S\";\n  const ew = lon >= 0 ? \"E\" : \"W\";\n  return `${Math.abs(lat).toFixed(3)}°${ns} · ${Math.abs(lon).toFixed(3)}°${ew}`;\n}\n\n/* ─── Map setup ─── */\nconst map = L.map(\"map\", {\n  center: [40.5, -4],\n  zoom: 6,\n  zoomControl: true,\n  attributionControl: true,\n  preferCanvas: true,\n});\n\nconst tileLayer = L.tileLayer(TILE_URLS[THEME], {\n  attribution: \"© OpenStreetMap contributors © CARTO\",\n  subdomains: \"abcd\",\n  maxZoom: 11,\n}).addTo(map);\n\n/* Place-name labels on their own pane (above the totality band so they stay\n   readable) — brightened in dark mode via CSS. */\nmap.createPane(\"labelsPane\");\nmap.getPane(\"labelsPane\").style.zIndex = 450;\nmap.getPane(\"labelsPane\").style.pointerEvents = \"none\";\nconst labelLayer = L.tileLayer(LABEL_URLS[THEME], {\n  subdomains: \"abcd\",\n  maxZoom: 11,\n  pane: \"labelsPane\",\n}).addTo(map);\n\n/* Helper: convert [lon,lat] arr → [lat,lon] for Leaflet */\nconst toLatLngs = (arr) => arr.map(([lo, la]) => [la, lo]);\n\n/* Penumbra halos — concentric buffered polygons around Umbra\n   Implemented as Leaflet polygons offset outward by progressively larger amounts in degrees */\nfunction offsetUmbraPolygon(deg) {\n  // simple radial offset from centroid — adequate for visual halo\n  const ring = UMBRA_FEAT.geometry.coordinates[0];\n  // compute centroid\n  let cx = 0, cy = 0;\n  ring.forEach(([lo, la]) => { cx += lo; cy += la; });\n  cx /= ring.length; cy /= ring.length;\n  return ring.map(([lo, la]) => {\n    const dx = lo - cx, dy = la - cy;\n    const len = Math.sqrt(dx*dx + dy*dy) || 1;\n    const scale = (len + deg) / len;\n    return [cy + dy * scale, cx + dx * scale];\n  });\n}\n\nconst penumbraStyles = [\n  { deg: 6.0, color: \"rgba(20, 60, 140, 0.06)\" }, // 20–40%\n  { deg: 3.8, color: \"rgba(20, 60, 140, 0.10)\" }, // 40–60%\n  { deg: 2.0, color: \"rgba(20, 60, 140, 0.15)\" }, // 60–80%\n  { deg: 0.8, color: \"rgba(20, 60, 140, 0.20)\" }, // 80–100%\n];\npenumbraStyles.forEach(({deg, color}) => {\n  L.polygon(offsetUmbraPolygon(deg), {\n    color: \"transparent\", fillColor: color, fillOpacity: 1, weight: 0, interactive: false,\n  }).addTo(map);\n});\n\n/* Umbra polygon */\nconst umbraPolygon = L.polygon(toLatLngs(UMBRA_FEAT.geometry.coordinates[0]), {\n  color: \"rgba(0,0,0,0)\", fillColor: \"#000\", fillOpacity: 0.60, weight: 0, interactive: false,\n}).addTo(map);\nfunction applyUmbraTheme() {\n  if (!umbraPolygon) return;\n  umbraPolygon.setStyle({\n    fillColor: THEME === \"light\" ? \"#1a1a24\" : \"#000\",\n    fillOpacity: THEME === \"light\" ? 0.32 : 0.38,\n  });\n}\napplyUmbraTheme();\n\n/* Center line */\nL.polyline(toLatLngs(CENTER_LIN), {\n  color: \"#f0c040\", weight: 2, opacity: 0.95, dashArray: \"6,4\", interactive: false,\n}).addTo(map);\n\n/* Limits */\nL.polyline(toLatLngs(NORTH_LIM), {\n  color: \"#b89020\", weight: 1, opacity: 0.65, interactive: false,\n}).addTo(map);\nL.polyline(toLatLngs(SOUTH_LIM), {\n  color: \"#b89020\", weight: 1, opacity: 0.65, interactive: false,\n}).addTo(map);\n\n/* City markers */\nfunction makeCityIcon(inUmbra) {\n  return L.divIcon({\n    className: \"\",\n    html: `<div class=\"city-marker ${inUmbra ? \"gold\" : \"blue\"}\"><\u002Fdiv>`,\n    iconSize: [12, 12],\n    iconAnchor: [6, 6],\n  });\n}\n\nCITIES.forEach(city => {\n  const inU = pointInUmbra(city.lon, city.lat);\n  const obs = obscurationAt(city.lat, city.lon);\n  const marker = L.marker([city.lat, city.lon], {\n    icon: makeCityIcon(inU),\n    keyboard: true,\n    title: `${city.name} — ${fmtObs(obs)}`,\n  }).addTo(map);\n  marker.bindTooltip(\n    `<strong>${city.name}<\u002Fstrong><span class=\"ct-pct ${inU ? \"\" : \"partial\"}\">${fmtObs(obs)}<\u002Fspan>`,\n    { className: \"city-tip\", direction: \"top\", offset: [0, -6], sticky: false }\n  );\n  marker.on(\"click\", (e) => {\n    L.DomEvent.stopPropagation(e);\n    selectLocation(city.lat, city.lon, city.name);\n  });\n});\n\n/* Selected crosshair marker */\nlet selectedMarker = null;\nconst crosshairIcon = L.divIcon({\n  className: \"\",\n  html: '<div class=\"crosshair-pin\"><span class=\"crosshair-pulse\"><\u002Fspan><\u002Fdiv>',\n  iconSize: [22, 22],\n  iconAnchor: [11, 11],\n});\n\n/* Click handler */\nmap.on(\"click\", (e) => {\n  selectLocation(e.latlng.lat, e.latlng.lng);\n});\n\n/* ─── Location selection / detail panel ─── */\nconst panel = document.getElementById(\"panel\");\nconst empty = document.getElementById(\"empty-state\");\n\nlet currentState = null;\nlet outsideState = null;\nlet playInterval = null;\n\nasync function reverseGeocode(lat, lon) {\n  try {\n    const ctrl = new AbortController();\n    const t = setTimeout(() => ctrl.abort(), 3000);\n    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=10`, { signal: ctrl.signal, headers: { \"Accept-Language\": LANG === \"pt\" ? \"pt,es,en\" : \"en\" } });\n    clearTimeout(t);\n    if (!res.ok) return null;\n    const data = await res.json();\n    const a = data.address || {};\n    return a.city || a.town || a.village || a.county || a.state || data.name || null;\n  } catch (e) {\n    return null;\n  }\n}\n\nfunction selectLocation(lat, lon, knownName) {\n  outsideState = null;\n  if (selectedMarker) selectedMarker.remove();\n  selectedMarker = L.marker([lat, lon], { icon: crosshairIcon, interactive: false, keyboard: false }).addTo(map);\n\n  const obs = obscurationAt(lat, lon);\n  const isTotal = obs >= 100;\n  const utMax = maxEclipseUtMinutes(lat, lon);\n  const sunAltMax = solarAltitudeDeg(lat, lon, utMax);\n  const tzOffsetMin = isPortugal(lat, lon) ? 60 : 120;\n  const localMax = utMax + tzOffsetMin;\n\n  // Contact offsets in minutes\n  const offset = isTotal ? 65 : Math.max(2, 65 * (obs / 100));\n  const c1 = localMax - offset;\n  const c4 = localMax + offset;\n  // Totality (C2/C3): half-duration centered on max, based on local geometry.\n  const totalitySec = isTotal ? totalityDurationSec(lat, lon) : 0;\n  const halfDurMin = (totalitySec / 2) / 60;\n  const c2 = isTotal ? localMax - halfDurMin : null;\n  const c3 = isTotal ? localMax + halfDurMin : null;\n\n  // If obscuration tiny, show \"outside visibility area\"\n  if (obs < 1) {\n    renderOutside(lat, lon, knownName);\n    return;\n  }\n\n  currentState = {\n    lat, lon, obs, isTotal,\n    name: knownName || null,\n    tzOffsetMin,\n    utMax, localMax, sunAltMax,\n    c1, c2, c3, c4,\n    currentMin: localMax,\n    playing: false,\n  };\n  renderPanel();\n\n  if (!knownName) {\n    reverseGeocode(lat, lon).then(name => {\n      if (!currentState) return;\n      currentState.name = name || `${lat.toFixed(3)}°, ${lon.toFixed(3)}°`;\n      const nameEl = document.getElementById(\"loc-name\");\n      if (nameEl) nameEl.textContent = currentState.name;\n    });\n  }\n}\n\nfunction renderOutside(lat, lon, knownName) {\n  currentState = null;\n  outsideState = { lat, lon, name: knownName || null };\n  panel.innerHTML = `\n    <div class=\"active\" style=\"display:flex;flex-direction:column;gap:16px;\">\n      <div class=\"loc-head\">\n        <div class=\"row1\"><span class=\"country\">${isPortugal(lat,lon) ? t(\"countryPT\") : t(\"countryES\")}<\u002Fspan><span class=\"flag\">${isPortugal(lat,lon) ? \"🇵🇹\" : \"🇪🇸\"}<\u002Fspan><\u002Fdiv>\n        <div class=\"name\">${knownName || fmtCoord(lat, lon)}<\u002Fdiv>\n        <div class=\"coords\">${fmtCoord(lat, lon)}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"display:flex;align-items:center;gap:12px;\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 16 16\" aria-hidden=\"true\"><circle cx=\"8\" cy=\"8\" r=\"6.5\" fill=\"none\" stroke=\"#888899\" stroke-width=\"1.4\"/><path d=\"M5 8h6\" stroke=\"#888899\" stroke-width=\"1.4\" stroke-linecap=\"round\"/><\u002Fsvg>\n        <div style=\"font-size:13.5px;line-height:1.45;color:var(--text-secondary);\">${t(\"outside\")}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  if (!knownName) reverseGeocode(lat, lon).then(n => {\n    if (n && outsideState) {\n      outsideState.name = n;\n      const nameEl = panel.querySelector(\".name\");\n      if (nameEl) nameEl.textContent = n;\n    }\n  });\n}\n\nfunction renderPanel() {\n  const s = currentState;\n  if (!s) return;\n  const flag = isPortugal(s.lat, s.lon) ? \"🇵🇹\" : \"🇪🇸\";\n  const country = isPortugal(s.lat, s.lon) ? t(\"countryPT\") : t(\"countryES\");\n  const obsClass = s.isTotal ? \"gold\" : \"blue\";\n  const badge = s.isTotal ? `<span class=\"badge total\">${t(\"badgeTotal\")}<\u002Fspan>` : `<span class=\"badge partial\">${t(\"badgePartial\")}<\u002Fspan>`;\n  const displayName = s.name || `${s.lat.toFixed(3)}°, ${s.lon.toFixed(3)}°`;\n\n  panel.innerHTML = `\n    <div class=\"active\" style=\"display:flex;flex-direction:column;gap:20px;\">\n\n      <div class=\"share-zone\" id=\"share-zone\">\n        <button class=\"share-btn\" id=\"share-btn\" type=\"button\" aria-label=\"${t(\"share\")}\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"18\" cy=\"5\" r=\"3\"/><circle cx=\"6\" cy=\"12\" r=\"3\"/><circle cx=\"18\" cy=\"19\" r=\"3\"/><line x1=\"8.6\" y1=\"13.5\" x2=\"15.4\" y2=\"17.5\"/><line x1=\"15.4\" y1=\"6.5\" x2=\"8.6\" y2=\"10.5\"/><\u002Fsvg>\n          ${t(\"share\")}\n        <\u002Fbutton>\n\n        <div class=\"loc-head\">\n          <div class=\"row1\"><span class=\"country\">${country}<\u002Fspan><span class=\"flag\">${flag}<\u002Fspan>${badge}<\u002Fdiv>\n          <div class=\"name\" id=\"loc-name\">${displayName}<\u002Fdiv>\n          <div class=\"coords\">${fmtCoord(s.lat, s.lon)}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"card obs-card\">\n          <div class=\"obs-card-text\">\n            <div class=\"label\">${t(\"maxObscuration\")}<\u002Fdiv>\n            <div class=\"obs-num ${obsClass}\" id=\"obs-num\">${fmtObs(s.obs)}<\u002Fdiv>\n            <div class=\"obs-legend\">\n              <span class=\"obs-leg\"><span class=\"obs-leg-lbl\">${t(\"maximum\")}<\u002Fspan><span class=\"obs-leg-val\">${fmtTime(s.localMax)}<\u002Fspan><\u002Fspan>\n              ${s.isTotal ? `\n              <span class=\"obs-leg-sep\"><\u002Fspan>\n              <span class=\"obs-leg\"><span class=\"obs-leg-lbl\">${t(\"duration\")}<\u002Fspan><span class=\"obs-leg-val\">${fmtDurationShort(s.c3 - s.c2)}<\u002Fspan><\u002Fspan>` : ``}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          ${obsDiscSvg(s.obs, 96)}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"horizon-wrap\">\n        <span class=\"label\">${t(\"horizonView\")}<\u002Fspan>\n        <canvas id=\"horizon\" width=\"800\" height=\"200\" aria-label=\"Horizon simulation\"><\u002Fcanvas>\n      <\u002Fdiv>\n\n      <div class=\"time-card\">\n        <div class=\"time-row\">\n          <div class=\"time-stat\">\n            <div class=\"label\">${t(\"localTime\")}<\u002Fdiv>\n            <div class=\"val gold\" id=\"t-local\">${fmtTime(s.currentMin)}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"time-stat\" style=\"flex:1;text-align:center;\">\n            <div class=\"label\">${t(\"currentCoverage\")}<\u002Fdiv>\n            <div class=\"val\" id=\"t-coverage\">0.0%<\u002Fdiv>\n          <\u002Fdiv>\n          <button class=\"play-btn\" id=\"play-btn\" aria-label=\"${t(\"play\")}\">▶<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"slider-wrap\">\n          <input type=\"range\" class=\"eclipse-slider\" id=\"slider\"\n            min=\"${Math.floor(s.c1)}\" max=\"${Math.ceil(s.c4)}\" step=\"1\" value=\"${Math.round(s.currentMin)}\"\n            aria-label=\"Eclipse time\" />\n          <div class=\"ticks\">\n            <span>${t(\"firstContact\")}<\u002Fspan>\n            <span style=\"color: var(--gold);\">${t(\"maximum\")}<\u002Fspan>\n            <span>${t(\"fourthContact\")}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  document.getElementById(\"slider\").addEventListener(\"input\", onSliderInput);\n  document.getElementById(\"play-btn\").addEventListener(\"click\", togglePlay);\n  document.getElementById(\"share-btn\").addEventListener(\"click\", shareZone);\n  updateForTime(s.currentMin);\n}\n\nfunction pctBetween(v, a, b) {\n  return Math.max(0, Math.min(100, ((v - a) / (b - a)) * 100));\n}\n\n/* ─── Share: capture the location card → clipboard → confirmation modal ─── */\nconst shareModal = document.getElementById(\"share-modal\");\nconst sharePreview = document.getElementById(\"share-preview\");\nconst shareCheck = document.getElementById(\"share-check\");\nconst shareTitleEl = document.getElementById(\"share-modal-title\");\nconst shareSubEl = document.getElementById(\"share-modal-sub\");\nconst shareCloseBtn = document.getElementById(\"share-close\");\nconst shareDownloadBtn = document.getElementById(\"share-download\");\nlet shareBlob = null;\n\nconst ICON_CHECK = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>';\nconst ICON_DOWNLOAD = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3v12\"/><polyline points=\"7 10 12 15 17 10\"/><path d=\"M5 21h14\"/><\u002Fsvg>';\n\nfunction openShareModal(blob, copied) {\n  shareBlob = blob;\n  sharePreview.innerHTML = \"\";\n  const img = document.createElement(\"img\");\n  img.alt = \"Eclipse location card\";\n  img.src = URL.createObjectURL(blob);\n  img.addEventListener(\"load\", () => URL.revokeObjectURL(img.src), { once: true });\n  sharePreview.appendChild(img);\n\n  const msg = document.getElementById(\"share-msg\");\n  msg.classList.toggle(\"err\", !copied);\n  shareCheck.innerHTML = copied ? ICON_CHECK : ICON_DOWNLOAD;\n  shareTitleEl.textContent = copied ? t(\"shareTitle\") : t(\"shareSavedTitle\");\n  shareSubEl.textContent = copied ? t(\"shareSub\") : t(\"shareSavedSub\");\n  shareDownloadBtn.innerHTML = ICON_DOWNLOAD + \"<span>\" + t(\"shareDownload\") + \"<\u002Fspan>\";\n  shareCloseBtn.textContent = t(\"shareDone\");\n\n  shareModal.classList.add(\"open\");\n  shareCloseBtn.focus();\n}\n\nfunction downloadShareImage() {\n  if (!shareBlob) return;\n  const a = document.createElement(\"a\");\n  a.href = URL.createObjectURL(shareBlob);\n  a.download = \"eclipse-location.png\";\n  document.body.appendChild(a);\n  a.click();\n  a.remove();\n  setTimeout(() => URL.revokeObjectURL(a.href), 4000);\n}\n\nfunction closeShareModal() {\n  shareModal.classList.remove(\"open\");\n}\nshareDownloadBtn.addEventListener(\"click\", downloadShareImage);\nshareCloseBtn.addEventListener(\"click\", closeShareModal);\nshareModal.addEventListener(\"click\", (e) => { if (e.target === shareModal) closeShareModal(); });\ndocument.addEventListener(\"keydown\", (e) => { if (e.key === \"Escape\" && shareModal.classList.contains(\"open\")) closeShareModal(); });\n\nasync function shareZone() {\n  const btn = document.getElementById(\"share-btn\");\n  const zone = document.getElementById(\"share-zone\");\n  if (!btn || !zone || typeof htmlToImage === \"undefined\") return;\n  btn.classList.add(\"busy\");\n  try {\n    const bg = getComputedStyle(document.querySelector(\".panel-col\")).backgroundColor;\n    // Capture the card directly (clone-based capture renders blank in some browsers)\n    const cardCanvas = await htmlToImage.toCanvas(zone, {\n      pixelRatio: 2,\n      backgroundColor: bg,\n      filter: (node) => !(node.classList && node.classList.contains(\"share-btn\")),\n    });\n    if (!cardCanvas) throw new Error(\"capture failed\");\n\n    // Compose title + card + footer URL onto one canvas (device px @2x)\n    const LEFT = 48, TOP = 40, RIGHT = 48, BOTTOM = 38, INSET = 36;\n    const FONT = \"Inter, system-ui, -apple-system, sans-serif\";\n    const FOOT_GAP = -22, FOOT_SIZE = 26;\n    const TITLE_SIZE = 32, SUB_SIZE = 22, TITLE_SUB_GAP = 10, HEAD_GAP = 30;\n    const SHARE_URL = \"astromidnight.pt/eclipse2026\";\n    const titleText = t(\"shareCardTitle\") || t(\"title\");\n    const subText = t(\"sharePreviewLabel\").toUpperCase();\n    const primary = getComputedStyle(document.documentElement).getPropertyValue(\"--text-primary\").trim() || \"#f0eff0\";\n    const muted = getComputedStyle(document.documentElement).getPropertyValue(\"--text-secondary\").trim() || \"#888899\";\n\n    const cardY = TOP + TITLE_SIZE + TITLE_SUB_GAP + SUB_SIZE + HEAD_GAP;\n    const CONTENT_X = LEFT + 2; // matches the captured card's content left edge\n    const cv = document.createElement(\"canvas\");\n    cv.width = LEFT + cardCanvas.width + RIGHT;\n    cv.height = cardY + cardCanvas.height + FOOT_GAP + FOOT_SIZE + BOTTOM;\n    const cx = cv.getContext(\"2d\");\n    cx.fillStyle = bg;\n    cx.fillRect(0, 0, cv.width, cv.height);\n    cx.textBaseline = \"top\";\n    // Title\n    cx.font = \"600 \" + TITLE_SIZE + \"px \" + FONT;\n    cx.fillStyle = primary;\n    cx.fillText(titleText, CONTENT_X, TOP);\n    // Subtitle (uppercase, tracked)\n    cx.font = \"600 \" + SUB_SIZE + \"px \" + FONT;\n    cx.fillStyle = muted;\n    if (\"letterSpacing\" in cx) cx.letterSpacing = \"3px\";\n    cx.fillText(subText, CONTENT_X, TOP + TITLE_SIZE + TITLE_SUB_GAP);\n    if (\"letterSpacing\" in cx) cx.letterSpacing = \"0px\";\n    // Card\n    cx.drawImage(cardCanvas, LEFT, cardY);\n    // Footer URL, aligned with the card content\n    cx.font = \"600 \" + FOOT_SIZE + \"px \" + FONT;\n    cx.fillStyle = muted;\n    cx.fillText(SHARE_URL, CONTENT_X, cardY + cardCanvas.height + FOOT_GAP);\n    const blob = await new Promise((resolve) => cv.toBlob((b) => resolve(b), \"image/png\"));\n    if (!blob) throw new Error(\"capture failed\");\n\n    let copied = false;\n    try {\n      if (navigator.clipboard && window.ClipboardItem) {\n        await Promise.race([\n          navigator.clipboard.write([new ClipboardItem({ \"image/png\": blob })]),\n          new Promise((_, rej) => setTimeout(() => rej(new Error(\"clipboard timeout\")), 3000)),\n        ]);\n        copied = true;\n      }\n    } catch (err) { copied = false; }\n\n    openShareModal(blob, copied);\n  } catch (err) {\n    console.error(\"Share failed:\", err);\n  } finally {\n    btn.classList.remove(\"busy\");\n  }\n}\n\n\n/* SVG: small obscuration disc showing sun + moon overlap */\nfunction obsDiscSvg(pct, size, monochrome) {\n  const r = size / 2 - 2;\n  const cx = size / 2, cy = size / 2;\n  // Moon offset: at 0% moon is fully off, at 100% moon centered\n  const maxOffset = 2 * r;\n  const offset = (1 - pct / 100) * maxOffset;\n  const sunFill = monochrome ? \"#f0c040\" : \"#f0c040\";\n  const moonFill = \"#0a0a0f\";\n  return `\n    <svg width=\"${size}\" height=\"${size}\" viewBox=\"0 0 ${size} ${size}\" aria-hidden=\"true\">\n      <defs>\n        <radialGradient id=\"sg${Math.round(pct*10)}\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n          <stop offset=\"0%\" stop-color=\"${sunFill}\"/>\n          <stop offset=\"80%\" stop-color=\"${sunFill}\"/>\n          <stop offset=\"100%\" stop-color=\"rgba(240,192,64,0.25)\"/>\n        <\u002FradialGradient>\n      <\u002Fdefs>\n      <circle cx=\"${cx}\" cy=\"${cy}\" r=\"${r}\" fill=\"url(#sg${Math.round(pct*10)})\"/>\n      <circle cx=\"${cx - offset}\" cy=\"${cy}\" r=\"${r}\" fill=\"${moonFill}\" stroke=\"rgba(255,255,255,0.1)\" stroke-width=\"0.5\"/>\n    <\u002Fsvg>\n  `;\n}\n\n/* ─── Slider / animation logic ─── */\nfunction coverageAtTime(min) {\n  const s = currentState; if (!s) return 0;\n  // Convert local minute → fraction through eclipse\n  // Use a cosine-shaped curve peaking at localMax with full obscuration\n  const half = (s.c4 - s.c1) / 2;\n  const t = (min - s.localMax) / half; // -1 .. 1\n  if (t <= -1 || t >= 1) return 0;\n  // cos-shaped from 0 → s.obs → 0\n  const cov = (Math.cos(t * Math.PI) + 1) / 2; // 0..1\n  return cov * s.obs;\n}\n\nfunction onSliderInput(e) {\n  const v = parseFloat(e.target.value);\n  currentState.currentMin = v;\n  updateForTime(v);\n}\n\nfunction togglePlay() {\n  const s = currentState; if (!s) return;\n  s.playing = !s.playing;\n  const btn = document.getElementById(\"play-btn\");\n  if (s.playing) {\n    btn.textContent = \"⏸\";\n    btn.setAttribute(\"aria-label\", t(\"pause\"));\n    // 10× speed, ~30fps ≈ 33ms; advance by 10/30 minute per tick ≈ 1/3 min\n    const tickMs = 33;\n    const advPerSec = 10; // 10 minutes per real second\n    const advPerTick = advPerSec * (tickMs / 1000);\n    playInterval = setInterval(() => {\n      if (!currentState) { clearInterval(playInterval); return; }\n      let next = currentState.currentMin + advPerTick;\n      if (next >= currentState.c4) { next = currentState.c1; }\n      currentState.currentMin = next;\n      const sl = document.getElementById(\"slider\");\n      if (sl) sl.value = Math.round(next);\n      updateForTime(next);\n    }, tickMs);\n  } else {\n    btn.textContent = \"▶\";\n    btn.setAttribute(\"aria-label\", t(\"play\"));\n    clearInterval(playInterval); playInterval = null;\n  }\n}\n\nfunction updateForTime(min) {\n  const s = currentState; if (!s) return;\n  const cov = coverageAtTime(min);\n  const localEl = document.getElementById(\"t-local\");\n  const covEl = document.getElementById(\"t-coverage\");\n  const marker = document.getElementById(\"chrono-marker\");\n  if (localEl) {\n    localEl.textContent = fmtTime(min);\n    const slider = document.getElementById(\"slider\");\n    if (slider) slider.setAttribute(\"aria-valuetext\", I18N[LANG].coverageAria(fmtTime(min), cov.toFixed(1)));\n  }\n  if (covEl) covEl.textContent = cov.toFixed(1) + \"%\";\n  if (marker) marker.style.left = pctBetween(min, s.c1, s.c4) + \"%\";\n  drawHorizon(cov);\n}\n\n/* ─── Solar altitude (NOAA approximation) ─── */\nfunction eclipseJulianDay(utHours) {\n  // Fixed date: 12 August 2026\n  let year = 2026, month = 8, day = 12;\n  if (month <= 2) { year -= 1; month += 12; }\n  const A = Math.floor(year / 100);\n  const B = 2 - A + Math.floor(A / 4);\n  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5 + utHours / 24;\n}\nfunction solarAltitudeDeg(lat, lon, utMinutes) {\n  const rad = Math.PI / 180, deg = 180 / Math.PI;\n  const JD = eclipseJulianDay(utMinutes / 60);\n  const T = (JD - 2451545.0) / 36525.0;\n  const L0 = ((280.46646 + T * (36000.76983 + T * 0.0003032)) % 360 + 360) % 360;\n  const M = 357.52911 + T * (35999.05029 - 0.0001537 * T);\n  const Mr = M * rad;\n  const e = 0.016708634 - T * (0.000042037 + 0.0000001267 * T);\n  const C = (1.914602 - T * (0.004817 + 0.000014 * T)) * Math.sin(Mr)\n          + (0.019993 - 0.000101 * T) * Math.sin(2 * Mr)\n          + 0.000289 * Math.sin(3 * Mr);\n  const trueLong = L0 + C;\n  const omega = 125.04 - 1934.136 * T;\n  const lambda = trueLong - 0.00569 - 0.00478 * Math.sin(omega * rad);\n  const eps0 = 23 + (26 + ((21.448 - T * (46.8150 + T * (0.00059 - T * 0.001813)))) / 60) / 60;\n  const eps = eps0 + 0.00256 * Math.cos(omega * rad);\n  const decl = Math.asin(Math.sin(eps * rad) * Math.sin(lambda * rad));\n  const y = Math.tan(eps * rad / 2) ** 2;\n  const L0r = L0 * rad;\n  const Eot = 4 * deg * (y * Math.sin(2 * L0r) - 2 * e * Math.sin(Mr)\n            + 4 * e * y * Math.sin(Mr) * Math.cos(2 * L0r)\n            - 0.5 * y * y * Math.sin(4 * L0r) - 1.25 * e * e * Math.sin(2 * Mr));\n  const tst = utMinutes + Eot + 4 * lon; // true solar time, minutes (lon east +)\n  const ha = (tst / 4) - 180;            // hour angle, degrees\n  const sinAlt = Math.sin(lat * rad) * Math.sin(decl)\n               + Math.cos(lat * rad) * Math.cos(decl) * Math.cos(ha * rad);\n  return Math.asin(Math.max(-1, Math.min(1, sinAlt))) * deg;\n}\n\n/* ─── Horizon canvas renderer ─── */\nfunction drawHorizon(coveragePct) {\n  const canvas = document.getElementById(\"horizon\");\n  if (!canvas) return;\n  // Make sure backing store matches CSS size for crispness\n  const rect = canvas.getBoundingClientRect();\n  const dpr = window.devicePixelRatio || 1;\n  if (canvas.width !== Math.round(rect.width * dpr) || canvas.height !== Math.round(rect.height * dpr)) {\n    canvas.width = Math.round(rect.width * dpr);\n    canvas.height = Math.round(rect.height * dpr);\n  }\n  const ctx = canvas.getContext(\"2d\");\n  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n  const W = rect.width, H = rect.height;\n  ctx.clearRect(0, 0, W, H);\n\n  const s = currentState; if (!s) return;\n  const isMaxTotal = s.isTotal && coveragePct >= 99;\n  // Non-linear darkening — the sky only visibly darkens above ~90% coverage,\n  // matching real eclipse perception. Stays bright daylight blue otherwise.\n  const cov = Math.min(1, coveragePct / 100);\n  const darkness = Math.pow(cov, 4);\n\n  // Sky gradient — bright daylight blue → near-black at totality\n  const sky = ctx.createLinearGradient(0, 0, 0, H);\n  const lerp = (a, b, t) => Math.round(a + (b - a) * t);\n  const topR = lerp(40,  2,  darkness);\n  const topG = lerp(90,  3,  darkness);\n  const topB = lerp(170, 10, darkness);\n  const horR = lerp(155, 6,  darkness);\n  const horG = lerp(195, 10, darkness);\n  const horB = lerp(225, 20, darkness);\n  sky.addColorStop(0, `rgb(${topR},${topG},${topB})`);\n  sky.addColorStop(0.75, `rgb(${horR},${horG},${horB})`);\n  if (isMaxTotal) {\n    // Reddish-orange horizon glow\n    sky.addColorStop(0.95, `rgb(80, 30, 18)`);\n    sky.addColorStop(1, `rgb(140, 50, 25)`);\n  } else {\n    sky.addColorStop(1, `rgb(${Math.min(255, horR+15)},${Math.min(255, horG+15)},${Math.min(255, horB+10)})`);\n  }\n  ctx.fillStyle = sky;\n  ctx.fillRect(0, 0, W, H);\n\n  // Stars during deep eclipse — appear brightest at totality, with a few\n  // bright planets/stars (like Venus) visible even at 97%+ partial coverage.\n  if (cov >= 0.97) {\n    // Star field: [x, y, radius, baseAlpha]\n    const stars = [\n      [0.08, 0.14, 1.0, 0.7],  [0.14, 0.22, 0.8, 0.55],\n      [0.21, 0.08, 1.3, 0.85], // bright \"Venus\"\n      [0.28, 0.30, 0.9, 0.6],  [0.34, 0.18, 0.7, 0.5],\n      [0.40, 0.10, 1.1, 0.75], [0.47, 0.26, 0.7, 0.5],\n      [0.52, 0.14, 0.9, 0.6],  [0.59, 0.32, 0.8, 0.55],\n      [0.66, 0.20, 1.0, 0.7],  [0.72, 0.06, 0.7, 0.5],\n      [0.78, 0.38, 0.9, 0.6],  [0.84, 0.16, 1.2, 0.8], // bright \"Sirius\"\n      [0.90, 0.12, 0.7, 0.5],  [0.94, 0.28, 0.8, 0.55],\n      [0.18, 0.52, 0.8, 0.55], [0.32, 0.60, 0.7, 0.45],\n      [0.50, 0.50, 0.9, 0.6],  [0.68, 0.56, 0.7, 0.5],\n      [0.82, 0.62, 0.9, 0.6],  [0.06, 0.42, 0.7, 0.45],\n      [0.96, 0.48, 0.8, 0.55]\n    ];\n    // Fade stars in between 97% and 100% coverage\n    const starFade = Math.min(1, (cov - 0.97) / 0.03);\n    stars.forEach(([fx, fy, r, alpha]) => {\n      const x = W * fx, y = H * fy;\n      const a = alpha * starFade;\n      // Subtle glow halo around brighter stars\n      if (r > 1.0) {\n        const halo = ctx.createRadialGradient(x, y, 0, x, y, r * 3.5);\n        halo.addColorStop(0, `rgba(255,255,255,${a * 0.6})`);\n        halo.addColorStop(1, \"rgba(255,255,255,0)\");\n        ctx.fillStyle = halo;\n        ctx.beginPath(); ctx.arc(x, y, r * 3.5, 0, Math.PI * 2); ctx.fill();\n      }\n      ctx.fillStyle = `rgba(255,255,255,${a})`;\n      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();\n    });\n  }\n\n  // ── Altitude scale ── maps degrees above the horizon to a y position.\n  // The eclipse occurs low in the sky here (≈6–11° over Iberia at sunset).\n  const sunAltMaxDeg = (typeof s.sunAltMax === \"number\") ? s.sunAltMax : 22;\n  // Live altitude: the Sun is descending toward sunset, so it sits HIGHER before\n  // maximum and sinks LOWER (eventually below the horizon) after it. Anchored so\n  // that at the moment of maximum eclipse it equals the known altitude.\n  const DESCENT_RATE = 0.19; // degrees of altitude lost per minute near sunset\n  const sunAltDeg = sunAltMaxDeg - (s.currentMin - s.localMax) * DESCENT_RATE;\n  // Altitude axis runs 0° (at the horizon) to 20° (near the top of the frame),\n  // so the low eclipse reads higher and more prominent.\n  const ALT_MAX = 20;\n  // Not clamped at the bottom — a setting Sun is allowed to drop below the horizon.\n  const altToY = (a) => H * 0.80 - (Math.min(a, ALT_MAX) / ALT_MAX) * (H * 0.70);\n\n  // View geometry shared by the Sun/Moon arc and the compass: a 120° field of\n  // view centred on the SW (225°), looking toward where the Sun sets.\n  const FOV = 120, AZ_CENTER = 225;\n\n  // Faint reference gridlines for altitude\n  ctx.save();\n  ctx.textBaseline = \"middle\";\n  ctx.textAlign = \"right\";\n  ctx.font = \"500 10px Inter, system-ui, sans-serif\";\n  ctx.setLineDash([3, 4]);\n  [20, 15, 10, 5].forEach((a) => {\n    const y = altToY(a);\n    ctx.strokeStyle = \"rgba(255,255,255,0.13)\";\n    ctx.lineWidth = 1;\n    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();\n    ctx.shadowColor = \"rgba(0,0,0,0.8)\"; ctx.shadowBlur = 3;\n    ctx.fillStyle = \"rgba(255,255,255,0.55)\";\n    ctx.fillText(a + \"°\", W - 6, y);\n    ctx.shadowBlur = 0;\n  });\n  // Highlighted line at the Sun's CURRENT altitude (hidden once it has set)\n  if (sunAltDeg > 0) {\n    const sunAltY = altToY(sunAltDeg);\n    ctx.setLineDash([5, 4]);\n    ctx.strokeStyle = \"rgba(240,192,64,0.6)\";\n    ctx.lineWidth = 1.25;\n    ctx.beginPath(); ctx.moveTo(0, sunAltY); ctx.lineTo(W, sunAltY); ctx.stroke();\n    ctx.setLineDash([]);\n    ctx.textAlign = \"left\";\n    ctx.font = \"600 12px Inter, system-ui, sans-serif\";\n    ctx.shadowColor = \"rgba(0,0,0,0.9)\"; ctx.shadowBlur = 4;\n    ctx.fillStyle = \"#f0c040\";\n    ctx.fillText(sunAltDeg.toFixed(0) + \"°\", 6, sunAltY - 9);\n  }\n  ctx.restore();\n\n  // Sun position — travels along a sunset arc as time advances: its azimuth\n  // drifts toward the W/NW (rightward in this SW-facing view) while its altitude\n  // (sunAltDeg, above) sinks toward — and past — the horizon.\n  const AZ_MAX = 238;   // Sun azimuth at maximum eclipse (≈WSW)\n  const AZ_RATE = 0.28; // degrees of azimuth gained per minute as it sets\n  const sunAzNow = AZ_MAX + (s.currentMin - s.localMax) * AZ_RATE;\n  const sunX = W / 2 + ((sunAzNow - AZ_CENTER) / FOV) * W;\n  const sunY = altToY(sunAltDeg);\n  const sunR = Math.min(W, H) * 0.13;\n\n  // Corona during total eclipse\n  if (isMaxTotal) {\n    const grad = ctx.createRadialGradient(sunX, sunY, sunR * 0.95, sunX, sunY, sunR * 3.2);\n    grad.addColorStop(0, \"rgba(255,250,235,0.95)\");\n    grad.addColorStop(0.25, \"rgba(255,240,200,0.45)\");\n    grad.addColorStop(0.6, \"rgba(240,192,64,0.15)\");\n    grad.addColorStop(1, \"rgba(240,192,64,0)\");\n    ctx.fillStyle = grad;\n    ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 3.2, 0, Math.PI*2); ctx.fill();\n  }\n\n  // Sun disc — soft glow if not totally covered\n  if (coveragePct < 99) {\n    const sunGrad = ctx.createRadialGradient(sunX, sunY, sunR * 0.4, sunX, sunY, sunR * 1.8);\n    sunGrad.addColorStop(0, \"rgba(255,240,180,0.9)\");\n    sunGrad.addColorStop(0.45, \"rgba(240,192,64,0.5)\");\n    sunGrad.addColorStop(1, \"rgba(240,192,64,0)\");\n    ctx.fillStyle = sunGrad;\n    ctx.beginPath(); ctx.arc(sunX, sunY, sunR * 1.8, 0, Math.PI*2); ctx.fill();\n  }\n  ctx.fillStyle = \"#ffeaa6\";\n  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.fill();\n\n  // Moon: locked alongside the (moving) Sun. Centre-to-centre distance tracks\n  // coverage — fully off the disc at 0%, perfectly centred at 100%. It approaches\n  // from the lower-right before maximum and exits toward the upper-left after it,\n  // climbing on a diagonal right→left the way the Moon really crosses the Sun.\n  const moonOffset = 2 * sunR * (1 - coveragePct / 100);\n  const beforeMax = currentState.currentMin <= currentState.localMax;\n  const TILT = 18 * Math.PI / 180; // path tilt off horizontal\n  const dir = beforeMax ? 1 : -1;\n  const moonX = sunX + dir * moonOffset * Math.cos(TILT);\n  const moonY = sunY + dir * moonOffset * Math.sin(TILT);\n  ctx.fillStyle = \"#0a0a0f\";\n  ctx.beginPath(); ctx.arc(moonX, moonY, sunR, 0, Math.PI*2); ctx.fill();\n\n  // Horizon silhouette\n  const hY = H * 0.82;\n  ctx.fillStyle = \"#05060a\";\n  ctx.beginPath();\n  ctx.moveTo(0, H);\n  ctx.lineTo(0, hY);\n  // Jagged terrain\n  const peaks = [\n    [0.05, hY - 3], [0.10, hY - 7],  [0.15, hY - 4],\n    [0.22, hY - 11], [0.30, hY - 6], [0.36, hY - 15],\n    [0.44, hY - 9],  [0.52, hY - 3], [0.58, hY - 13],\n    [0.66, hY - 19], [0.72, hY - 7], [0.80, hY - 11],\n    [0.86, hY - 4],  [0.92, hY - 9], [0.98, hY - 2]\n  ];\n  peaks.forEach(([fx, py]) => ctx.lineTo(W*fx, py));\n  ctx.lineTo(W, hY);\n  ctx.lineTo(W, H);\n  ctx.closePath();\n  ctx.fill();\n\n  // Cardinal points visible in this view (looking SW, ~120° field of view\n  // centred on 225°, so the range 165°–285° covers S, SW and W).\n  const compass = {\n    en: { 180: \"S\", 225: \"SW\", 270: \"W\" },\n    pt: { 180: \"S\", 225: \"SO\", 270: \"O\" },\n  };\n  const labels = compass[LANG] || compass.en;\n  ctx.save();\n  ctx.textAlign = \"center\";\n  ctx.textBaseline = \"alphabetic\";\n  Object.keys(labels).forEach((azStr) => {\n    const az = +azStr;\n    const x = W / 2 + ((az - AZ_CENTER) / FOV) * W;\n    if (x < 8 || x > W - 8) return;\n    const isCenter = az === AZ_CENTER;\n    // Short tick on the horizon line + label on the terrain below it\n    ctx.strokeStyle = isCenter ? \"rgba(240,192,64,0.8)\" : \"rgba(255,255,255,0.6)\";\n    ctx.lineWidth = 1;\n    ctx.beginPath();\n    ctx.moveTo(x, hY + 2);\n    ctx.lineTo(x, hY + 9);\n    ctx.stroke();\n    ctx.font = `600 ${isCenter ? 12 : 11}px Inter, system-ui, sans-serif`;\n    ctx.shadowColor = \"rgba(0,0,0,0.9)\";\n    ctx.shadowBlur = 3;\n    ctx.fillStyle = isCenter ? \"#f0c040\" : \"rgba(255,255,255,0.92)\";\n    ctx.fillText(labels[az], x, hY + 22);\n  });\n  ctx.restore();\n}\n\n/* Window resize: redraw horizon */\nwindow.addEventListener(\"resize\", () => {\n  if (currentState) drawHorizon(coverageAtTime(currentState.currentMin));\n  if (typeof map !== \"undefined\" && map) map.invalidateSize();\n});\n\n/* Apply initial language */\napplyStaticI18N();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
